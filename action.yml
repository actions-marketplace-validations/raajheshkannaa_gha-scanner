name: 'GHA Scanner'
description: 'Scan GitHub Actions workflows for security vulnerabilities. 25 checks across 8 categories.'
author: 'Raajhesh Kannaa Chidambaram'
branding:
  icon: 'shield'
  color: 'green'
inputs:
  token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}
  fail-on:
    description: 'Fail the action if findings at this severity or above are found (critical, high, medium, low, none)'
    required: false
    default: 'high'
outputs:
  score:
    description: 'Security score (0-100)'
  grade:
    description: 'Letter grade (A-F)'
  findings:
    description: 'Number of findings'
  result:
    description: 'Full scan result as JSON'
runs:
  using: 'node20'
  main: 'dist/action.js'
